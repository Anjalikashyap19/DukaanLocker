spring.datasource.url=jdbc:h2:mem:dukaanlocker
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update



spring.jpa.properties.hibernate.format_sql=true

# JPA / Hibernate Configurations

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.scan.packages=com.shoplocker.fssai

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# FSSAI Service Configuration
fssai.portal.url=https://foscos.fssai.gov.in/
fssai.scraper.timeout-seconds=60
fssai.download.path=downloads/fssai/

server.port=8081

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true